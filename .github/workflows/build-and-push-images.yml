name: Build and Push Images

on:
  push:
    branches:
      - release
    paths:
      - ".github/workflows/build-and-push-images.yml"
      - "frontend/**"
      - "backend/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            image_suffix: game-wiki-frontend
          - service: backend
            context: ./backend
            image_suffix: game-wiki-backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        shell: pwsh
        run: |
          $owner = "${{ github.repository_owner }}".ToLowerInvariant()
          "image=ghcr.io/$owner/${{ matrix.image_suffix }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=release,enable=${{ github.ref == 'refs/heads/release' }}
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

