# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name fromdex.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name fromdex.com;

    ssl_certificate /etc/letsencrypt/live/fromdex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fromdex.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # React Router: 404時はindex.htmlにフォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }

    # APIリクエストをバックエンドへプロキシ
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # アップロード画像をバックエンドへプロキシ
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
    }
}
